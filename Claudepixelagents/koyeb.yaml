name: multi-platform-bot
version: "1.0"

# Настройки приложения
app:
  name: multi-platform-bot
  type: docker
  dockerfile: Dockerfile
  port: 8080
  health_check:
    path: /health
    interval: 30s
    timeout: 10s
    retries: 3

# Переменные окружения (секреты)
env:
  - key: PORT
    value: "8080"
  - key: TELEGRAM_BOT_TOKEN
    secret: true
  - key: GROQ_API_KEY
    secret: true

# Ресурсы (бесплатный план)
instance_type: nano
regions:
  - was

# Автоматический перезапуск
restart_policy:
  type: on_failure
  max_retries: 3

# Масштабирование (минимум для бесплатного плана)
scaling:
  min_instances: 1
  max_instances: 1
